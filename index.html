<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neural Digit Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    /* ─── RESET & VARIABLES ─────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --border:    #1e2330;
      --accent:    #00f5c4;
      --accent2:   #0ff;
      --danger:    #ff4f6d;
      --text:      #c8d6e5;
      --dim:       #4a5568;
      --glow:      0 0 20px rgba(0,245,196,0.3);
      --glow-lg:   0 0 40px rgba(0,245,196,0.2);
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ─── GRID BACKGROUND ───────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LAYOUT ────────────────────────────────────── */
    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* ─── HEADER ────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-line {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1;
      color: #fff;
    }

    h1 span {
      color: var(--accent);
      text-shadow: var(--glow);
    }

    .subtitle {
      margin-top: 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 2px;
    }

    /* ─── MAIN CARD ─────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    @media (max-width: 640px) {
      .card { grid-template-columns: 1fr; }
    }

    /* ─── LEFT PANEL ────────────────────────────────── */
    .panel-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }

    .panel-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Canvas container */
    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      cursor: crosshair;
      transition: border-color 0.2s;
    }

    .canvas-wrap:hover { border-color: var(--accent); }
    .canvas-wrap.drawing { border-color: var(--accent); box-shadow: var(--glow); }

    canvas {
      width: 100%; height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    /* hint overlay */
    .canvas-hint {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .canvas-hint.hidden { opacity: 0; }

    /* Buttons */
    .btn-row {
      display: flex; gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { border-color: var(--dim); color: #fff; }

    .btn-primary {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent);
      color: #000;
      box-shadow: var(--glow);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: transparent;
      color: var(--accent);
      box-shadow: none;
    }

    .btn-clear { border-color: var(--border); }
    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

    /* Brush size */
    .brush-row {
      margin-top: 12px;
      display: flex; align-items: center; gap: 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }

    input[type=range] {
      flex: 1;
      accent-color: var(--accent);
    }

    /* ─── RIGHT PANEL ───────────────────────────────── */
    .result-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Big digit display */
    .digit-display {
      background: #000;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 24px;
      text-align: center;
      min-height: 120px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: border-color 0.3s;
    }

    .digit-display.active {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }

    .digit-number {
      font-family: var(--mono);
      font-size: 72px;
      line-height: 1;
      color: var(--accent);
      text-shadow: var(--glow-lg);
      transition: all 0.3s;
    }

    .digit-number.empty { color: var(--border); font-size: 48px; }

    .confidence-text {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--dim);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .confidence-text span { color: var(--accent); }

    /* Probability bars */
    .bars-section {}

    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .bar-digit {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--dim);
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--dim);
      border-radius: 3px;
      width: 0%;
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .bar-fill.top {
      background: var(--accent);
      box-shadow: 0 0 8px rgba(0,245,196,0.6);
    }

    .bar-pct {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      width: 38px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Status log */
    .status-log {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
      border-top: 1px solid var(--border);
      padding-top: 14px;
      min-height: 20px;
    }

    .status-log .ok   { color: var(--accent); }
    .status-log .err  { color: var(--danger); }
    .status-log .wait { color: #f5a623; }

    /* ─── FOOTER ────────────────────────────────────── */
    footer {
      margin-top: 32px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--dim);
      text-align: center;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    footer span { color: var(--accent); }

    /* ─── LOADING SPINNER ───────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    /* ─── ANIMATIONS ────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .pop { animation: pop 0.3s ease; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo-line">// neural-digit-engine v1.0</div>
    <h1>Digit <span>Recognizer</span></h1>
    <div class="subtitle">Python → C++ inference → Flask → HTML/JS</div>
  </header>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- LEFT: DRAW -->
    <div class="left-panel">
      <div class="panel-label">Draw a digit</div>

      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="drawCanvas" width="280" height="280"></canvas>
        <div class="canvas-hint" id="hint">draw here</div>
      </div>

      <div class="brush-row">
        <span>brush</span>
        <input type="range" id="brushSize" min="8" max="32" value="18">
        <span id="brushVal">18px</span>
      </div>

      <div class="btn-row">
        <button class="btn btn-clear" id="clearBtn">Clear</button>
        <button class="btn btn-primary" id="predictBtn" disabled>Predict →</button>
      </div>
    </div>

    <!-- RIGHT: RESULT -->
    <div class="result-panel">
      <div>
        <div class="panel-label">Prediction</div>
        <div class="digit-display" id="digitDisplay">
          <div class="digit-number empty" id="digitNumber">?</div>
          <div class="confidence-text" id="confidenceText">draw a digit and click predict</div>
        </div>
      </div>

      <div class="bars-section">
        <div class="panel-label">Confidence per digit</div>
        <div id="barsContainer">
          <!-- generated by JS -->
        </div>
      </div>

      <div class="status-log" id="statusLog">
        &gt; waiting for input...
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    built from scratch &nbsp;|&nbsp;
    <span>Python</span> + <span>C++</span> + <span>Flask</span> + <span>HTML/JS</span>
  </footer>

</div>

<script>
// ─────────────────────────────────────────
//  CONFIG
//  Auto-detects: localhost in dev, same origin in production
// ─────────────────────────────────────────
const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:5000/predict'
  : '/predict';

// ─────────────────────────────────────────
//  ELEMENTS
// ─────────────────────────────────────────
const canvas      = document.getElementById('drawCanvas');
const ctx         = canvas.getContext('2d');
const canvasWrap  = document.getElementById('canvasWrap');
const hint        = document.getElementById('hint');
const predictBtn  = document.getElementById('predictBtn');
const clearBtn    = document.getElementById('clearBtn');
const brushInput  = document.getElementById('brushSize');
const brushVal    = document.getElementById('brushVal');
const digitNum    = document.getElementById('digitNumber');
const confText    = document.getElementById('confidenceText');
const digitDisp   = document.getElementById('digitDisplay');
const statusLog   = document.getElementById('statusLog');
const barsWrap    = document.getElementById('barsContainer');

// ─────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, 280, 280);
ctx.lineCap    = 'round';
ctx.lineJoin   = 'round';
ctx.strokeStyle = '#fff';

let drawing  = false;
let hasDrawn = false;
let brushSz  = 18;

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / r.width;
  const scaleY = canvas.height / r.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - r.left) * scaleX,
      y: (e.touches[0].clientY - r.top)  * scaleY
    };
  }
  return {
    x: (e.clientX - r.left) * scaleX,
    y: (e.clientY - r.top)  * scaleY
  };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  canvasWrap.classList.add('drawing');
}

function draw(e) {
  if (!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  ctx.lineWidth = brushSz;
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);

  if (!hasDrawn) {
    hasDrawn = true;
    hint.classList.add('hidden');
    predictBtn.disabled = false;
  }
}

function stopDraw() {
  drawing = false;
  canvasWrap.classList.remove('drawing');
}

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  draw);
canvas.addEventListener('mouseup',    stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove',  draw,      { passive: false });
canvas.addEventListener('touchend',   stopDraw);

// Brush size
brushInput.addEventListener('input', () => {
  brushSz = +brushInput.value;
  brushVal.textContent = brushSz + 'px';
});

// Clear
clearBtn.addEventListener('click', () => {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 280, 280);
  hasDrawn = false;
  predictBtn.disabled = true;
  hint.classList.remove('hidden');
  resetResult();
  setStatus('waiting for input...', '');
});

// ─────────────────────────────────────────
//  PIXEL EXTRACTION
//  Resize 280x280 canvas → 28x28, normalise
// ─────────────────────────────────────────
function getPixels() {
  // Draw canvas content into a 28x28 offscreen canvas
  const small = document.createElement('canvas');
  small.width = small.height = 28;
  const sCtx = small.getContext('2d');
  sCtx.drawImage(canvas, 0, 0, 28, 28);

  const imageData = sCtx.getImageData(0, 0, 28, 28).data;
  const pixels = [];

  // Use red channel (grayscale), normalise with MNIST mean/std
  // mean=0.1307, std=0.3081  →  normalised = (pixel/255 - 0.1307) / 0.3081
  for (let i = 0; i < 784; i++) {
    const raw = imageData[i * 4] / 255.0;           // R channel [0,1]
    const norm = (raw - 0.1307) / 0.3081;           // MNIST normalisation
    pixels.push(norm);
  }
  return pixels;
}

// ─────────────────────────────────────────
//  PREDICT
// ─────────────────────────────────────────
predictBtn.addEventListener('click', async () => {
  const pixels = getPixels();
  predictBtn.disabled = true;
  setStatus('<span class="spinner"></span><span class="wait">calling engine...</span>', '');

  try {
    const res = await fetch(API_URL, {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ pixels })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      throw new Error(data.error || 'Unknown error');
    }

    showResult(data);
    setStatus(`&gt; <span class="ok">prediction complete</span> — digit=${data.digit}, confidence=${data.confidence}%`, 'ok');

  } catch (err) {
    setStatus(`&gt; <span class="err">error: ${err.message}</span>`, 'err');
    console.error(err);
  } finally {
    predictBtn.disabled = false;
  }
});

// ─────────────────────────────────────────
//  SHOW RESULT
// ─────────────────────────────────────────
function showResult(data) {
  // Big digit
  digitNum.textContent = data.digit;
  digitNum.classList.remove('empty');
  digitDisp.classList.add('active');

  // Trigger pop animation
  digitNum.classList.remove('pop');
  void digitNum.offsetWidth;
  digitNum.classList.add('pop');

  confText.innerHTML = `confidence: <span>${data.confidence}%</span>`;

  // Probability bars
  updateBars(data.probabilities, data.digit);
}

function resetResult() {
  digitNum.textContent = '?';
  digitNum.classList.add('empty');
  digitDisp.classList.remove('active');
  confText.textContent = 'draw a digit and click predict';
  updateBars(new Array(10).fill(0), -1);
}

function updateBars(probs, topDigit) {
  barsWrap.innerHTML = '';
  probs.forEach((p, i) => {
    const pct = (p * 100).toFixed(1);
    const isTop = i === topDigit;

    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-digit">${i}</div>
      <div class="bar-track">
        <div class="bar-fill ${isTop ? 'top' : ''}" data-pct="${pct}"></div>
      </div>
      <div class="bar-pct">${pct}%</div>
    `;
    barsWrap.appendChild(row);
  });

  // Animate bars after render
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });
}

function setStatus(html) {
  statusLog.innerHTML = '&gt; ' + html;
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
updateBars(new Array(10).fill(0), -1);
setStatus('waiting for input...');
</script>
</body>
</html>
